<!DOCTYPE html>
<html lang="ro" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pescuit Exact</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="bg-overlay"></div>
    <div class="content-wrapper">
        <header>
            <select id="lang-select">
                <option value="ro">RO</option>
                <option value="en">EN</option>
            </select>
            <select id="theme-select">
                <option value="dark">Midnight</option>
                <option value="solar">Solar</option>
                <option value="camo">Camo</option>
            </select>
        </header>

        <section class="hero">
            <div class="score-display">
                <div id="main-score">--%</div>
                <p id="status-text">Alege locația de pescuit</p>
            </div>
        </section>

        <nav class="main-nav">
            <button onclick="updateData('river')">🌊 DUNĂRE</button>
            <button onclick="updateData('lake')">🎣 BĂLȚI</button>
        </nav>

        <section id="details-section" class="hidden">
            <div class="data-row">
                <div class="info-card">
                    <h4 id="h-meteo">Meteo</h4>
                    <p id="d-presiune">--</p>
                    <p id="d-vant">--</p>
                </div>
                <div class="info-card">
                    <h4 id="h-apa">Stare Apă</h4>
                    <p id="d-cota">--</p>
                    <p id="d-claritate">--</p>
                </div>
            </div>
            
            <div class="full-card">
                <h4 id="h-strat">Strategie & Momeală</h4>
                <p id="d-strat">--</p>
            </div>

            <div class="table-view">
                <h4 id="h-prog">Prognoză Puncte Dunăre</h4>
                <table id="river-table">
                    <!-- Datele vor fi injectate aici -->
                </table>
            </div>
        </section>
    </div>
    <script src="./script.js"></script>
</body>
</html>
