<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pescuit Exact PRO</title>
    <link rel="stylesheet" href="https://unpkg.com" />
    <style>
        :root { --acc: #00ff88; --bg: #0b0e14; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 15px; }
        header { border-bottom: 2px solid var(--acc); padding-bottom: 10px; margin-bottom: 20px; }
        .nav { display: flex; gap: 10px; margin-bottom: 20px; }
        button { flex: 1; padding: 15px; border: 2px solid var(--acc); background: rgba(0,255,136,0.1); color: #fff; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .card { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 12px; border-top: 4px solid var(--acc); text-align: left; margin-bottom: 20px; }
        #map { height: 250px; border-radius: 10px; margin-top: 15px; border: 1px solid var(--acc); }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 8px; border: 2px solid var(--acc); background: #1a1a1a; color: #fff; box-sizing: border-box; font-size: 1rem; }
        table { width: 100%; border-collapse: collapse; background: rgba(0,0,0,0.3); border-radius: 8px; overflow: hidden; }
        th { background: var(--acc); color: #000; padding: 10px; text-align: left; }
        td { padding: 12px 10px; border-bottom: 1px solid #333; cursor: pointer; }
        tr:hover { background: rgba(0,255,136,0.1); }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <header>
        <h2 style="margin:0; color:var(--acc)">PESCUIT EXACT PRO</h2>
        <p style="font-size:0.8rem; margin:5px 0 0 0;">Toate județele • Taxe • Regulament • Hartă</p>
    </header>

    <div class="nav">
        <button onclick="show('river')">🌊 DUNĂRE</button>
        <button onclick="show('lake')">🎣 BĂLȚI & LACURI</button>
    </div>

    <!-- SECTIUNE BALTI -->
    <section id="lake-section" class="hidden">
        <input type="text" id="search" placeholder="Scrie JUDEȚUL (ex: Ilfov, Giurgiu, Olt)..." oninput="filter()">
        
        <div id="details" class="card hidden">
            <h3 id="det-name" style="margin:0; color:var(--acc);"></h3>
            <p id="det-meta" style="margin:10px 0; font-weight:bold;"></p>
            <div style="background:rgba(0,0,0,0.3); padding:10px; border-radius:8px;">
                <h4 style="margin:0 0 5px 0; font-size:0.8rem; color:var(--acc)">REGULAMENT:</h4>
                <p id="det-reguli" style="margin:0; font-size:0.9rem; line-height:1.4;"></p>
            </div>
            <div id="map"></div>
        </div>

        <table id="lake-table">
            <thead><tr><th>Locație</th><th>Județ</th><th>Taxă</th></tr></thead>
            <tbody id="table-body"></tbody>
        </table>
    </section>

    <!-- SECTIUNE DUNARE -->
    <section id="river-section" class="hidden">
        <div class="card">
            <h3>Cote Dunăre Live</h3>
            <p>📍 <b>Giurgiu:</b> +2cm (Stabil)</p>
            <p>📍 <b>Baziaș:</b> +12cm (Creștere)</p>
            <p>📍 <b>Tulcea:</b> -4cm (Scădere)</p>
            <hr>
            <p style="color:var(--acc)">ℹ️ <b>Prohibiție:</b> Din 9 Aprilie până în 7 Iunie.</p>
        </div>
    </section>

    <script src="https://unpkg.com"></script>
    <script>
        const balti = [
            { n: "Hermes Periș", j: "Ilfov", t: "150 RON", r: "C&R Sportiv. Doar monturi fir de păr. Saltea cadă obligatorie.", lat: 44.68, lng: 26.01 },
            { n: "Bila 2", j: "Giurgiu", t: "100 RON", r: "Max 4 lansete. Reținere caras permisă. Crap >4kg se eliberează.", lat: 44.31, lng: 25.75 },
            { n: "Chiroiu 4", j: "Ialomița", t: "100 RON", r: "Pescuit sportiv. Fără momeală vie. Crapul mare se eliberează.", lat: 44.48, lng: 26.43 },
            { n: "Budeasa", j: "Argeș", t: "80 RON", r: "Pescuit pe baraj. Crap, Șalău, Plătică.", lat: 44.91, lng: 24.81 },
            { n: "Suhaia", j: "Teleorman", t: "80 RON", r: "Crap sălbatic. Atenție la vânt. Lac foarte întins.", lat: 43.74, lng: 25.21 },
            { n: "Fântânele", j: "Dolj", t: "100 RON", r: "Crap și Ten. Maluri curate, acces auto facil.", lat: 44.11, lng: 23.65 },
            { n: "Dorobanțu", j: "Călărași", t: "100 RON", r: "Reținere 5kg. Crap, Ten, Somn.", lat: 44.22, lng: 26.95 },
            { n: "Zăvideni", j: "Olt", t: "Permis ANPA", r: "Pescuit pe baraj. Somn și Crap mare.", lat: 44.65, lng: 24.26 },
            { n: "Enisala", j: "Tulcea", t: "80 RON", r: "Caras mare și Șalău. Lângă cetate.", lat: 44.88, lng: 28.83 }
        ];

        let map, marker;

        function show(id) {
            document.getElementById('lake-section').classList.toggle('hidden', id !== 'lake');
            document.getElementById('river-section').classList.toggle('hidden', id !== 'river');
            if(id === 'lake') {
                render(balti);
                if(!map) {
                    map = L.map('map').setView([44.5, 26.0], 7);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                }
                setTimeout(() => map.invalidateSize(), 300);
            }
        }

        function render(data) {
            const body = document.getElementById('table-body');
            body.innerHTML = data.map(b => `
                <tr onclick="det('${b.n}')">
                    <td><b>${b.n}</b></td><td>${b.j}</td><td>${b.t}</td>
                </tr>`).join('');
        }

        function filter() {
            const val = document.getElementById('search').value.toLowerCase();
            render(balti.filter(b => b.j.toLowerCase().includes(val) || b.n.toLowerCase().includes(val)));
        }

        function det(name) {
            const b = balti.find(x => x.n === name);
            document.getElementById('details').classList.remove('hidden');
            document.getElementById('det-name').innerText = b.n;
            document.getElementById('det-meta').innerHTML = `📍 Județ: ${b.j} | 💰 Taxă: ${b.t}`;
            document.getElementById('det-reguli').innerText = b.r;
            
            map.setView([b.lat, b.lng], 13);
            if(marker) map.removeLayer(marker);
            marker = L.marker([b.lat, b.lng]).addTo(map).bindPopup(b.n).openPopup();
            document.getElementById('details').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
