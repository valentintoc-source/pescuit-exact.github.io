<!DOCTYPE html>
<html lang="ro" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pescuit Exact | Pro</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="bg-overlay"></div>
    <div class="content-wrapper">
        <header>
            <select id="lang-select">
                <option value="ro">RO</option>
                <option value="en">EN</option>
            </select>
            <div class="logo-text">PESCUIT EXACT</div>
            <select id="theme-select">
                <option value="dark">Midnight</option>
                <option value="solar">Solar</option>
                <option value="camo">Camo</option>
            </select>
        </header>

        <section class="hero">
            <div class="score-display">
                <div id="main-score">--%</div>
                <p id="status-text">Selectează destinația</p>
            </div>
        </section>

        <nav class="main-nav">
            <button onclick="updateData('river')">🌊 DUNĂRE</button>
            <button onclick="updateData('lake')">🎣 BĂLȚI & LACURI</button>
        </nav>

        <section id="details-section" class="hidden">
            <!-- Filtru Căutare (Apare doar la Bălți) -->
            <div id="search-container" class="hidden">
                <input type="text" id="lake-search" placeholder="Caută județ (ex: Cluj, Iași)..." onkeyup="filterLakes()">
            </div>

            <div class="data-row">
                <div class="info-card">
                    <h4 id="h-meteo">Meteo & Presiune</h4>
                    <p id="d-presiune">--</p>
                    <p id="d-vant">--</p>
                </div>
                <div class="info-card">
                    <h4 id="h-apa">Detalii Locație</h4>
                    <p id="d-cota">--</p>
                    <p id="d-claritate">--</p>
                </div>
            </div>
            
            <div class="full-card">
                <h4 id="h-strat">Strategie / Regulament</h4>
                <p id="d-strat">Selectează o opțiune.</p>
            </div>

            <div class="table-view">
                <h4 id="h-prog">Informații Live</h4>
                <div class="table-scroll">
                    <table id="main-table"></table>
                </div>
            </div>
        </section>
    </div>
    <script src="./script.js"></script>
</body>
</html>
