<!DOCTYPE html>
<html lang="ro" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pescuit Exact | Pro Dashboard</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="overlay"></div> <!-- Pentru textura de fundal -->
    
    <header>
        <div class="top-bar">
            <select id="lang-select">
                <option value="ro">🇷🇴 RO</option>
                <option value="en">🇬🇧 EN</option>
            </select>
            <div class="logo">PESCUIT EXACT</div>
            <select id="theme-select">
                <option value="dark">🌑 Midnight</option>
                <option value="solar">☀️ Solar</option>
                <option value="camo">🌿 Camo</option>
            </select>
        </div>
    </header>

    <main>
        <div class="main-score">
            <div class="score-circle">
                <span id="score-value">--%</span>
            </div>
            <h2 id="score-text">Selectează Locația</h2>
        </div>

        <div class="selection-cards">
            <button class="card" onclick="selectType('river')">🌊 DUNĂRE</button>
            <button class="card" onclick="selectType('lake')">🎣 BĂLȚI / LACURI</button>
        </div>

        <!-- ZONA DE DATE COMPLEXE -->
        <div id="data-container" style="display: none;">
            <div class="data-grid">
                <div class="data-card">
                    <h4 id="label-meteo">METEO & PRESIUNE</h4>
                    <p id="val-presiune">1012 hPa (Stabil)</p>
                    <p id="val-vant">Vânt: 12 km/h (S-V)</p>
                </div>
                <div class="data-card">
                    <h4 id="label-solunar">SOLUNAR</h4>
                    <p>Major: 14:20 - 16:20</p>
                    <p>Minor: 08:10 - 09:10</p>
                </div>
            </div>

            <div class="recommendation-box">
                <h3 id="label-strategie">Strategie Recomandată</h3>
                <p id="val-strategie">--</p>
            </div>

            <div class="table-container">
                <h3 id="label-prognoza">Prognoză pe Ore (8 Aprilie 2026)</h3>
                <table id="forecast-table">
                    <thead>
                        <tr><th>Ora</th><th>Activitate</th><th>Momeală</th></tr>
                    </thead>
                    <tbody>
                        <tr><td>12:00</td><td>65%</td><td>Viermuși</td></tr>
                        <tr><td>15:00</td><td>85%</td><td>Wafters</td></tr>
                        <tr><td>18:00</td><td>70%</td><td>Porumb</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="./script.js"></script>
</body>
</html>
