<<!--<!DOCTYPE html>
<html lang="ro" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pescuit Exact PRO</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="bg-overlay"></div>
    <div class="content-wrapper">
        <header>
            <div class="header-left">
                <button id="btn-home">🏠</button>
                <select id="lang-select">
                    <option value="ro">RO</option>
                    <option value="en">EN</option>
                </select>
            </div>
            <div class="logo-text">PESCUIT EXACT</div>
            <select id="theme-select">
                <option value="dark">Midnight</option>
                <option value="solar">Solar</option>
                <option value="camo">Camo</option>
            </select>
        </header>

        <nav class="main-nav">
            <button id="nav-river">🌊 DUNĂRE</button>
            <button id="nav-lake">🎣 BĂLȚI</button>
            <button id="nav-calc">🧮 CALC</button>
        </nav>

        <section id="details-section" class="hidden">
            <div id="search-container" class="hidden">
                <input type="text" id="lake-search" placeholder="Caută județ sau nume...">
            </div>
            <div class="pro-card">
                <div class="card-header">
                    <h2 id="loc-name">Selectează Locația</h2>
                    <div id="loc-rating" class="stars"></div>
                </div>
                <div class="data-grid">
                    <div class="data-item">Taxă: <b id="loc-taxa">--</b></div>
                    <div class="data-item">Județ: <b id="loc-judet">--</b></div>
                </div>
                <div class="info-block">
                    <p id="loc-reguli">Selectează o opțiune din listă.</p>
                </div>
            </div>
            <div class="table-view">
                <table id="main-table"></table>
            </div>
        </section>

        <section id="calc-section" class="hidden pro-card">
            <h3>🧮 Calculator Momeli</h3>
            <select id="calc-fish">
                <option value="crap">Crap</option>
                <option value="caras">Caras / Plătică</option>
            </select>
            <p>Temperatură apă: <span id="temp-val">15</span>°C</p>
            <input type="range" id="calc-temp" min="4" max="30" value="15">
            <button id="btn-calculate" class="action-btn">Generează Rețetă</button>
            <div id="calc-result" class="info-block" style="margin-top:15px; display:none;"></div>
        </section>
    </div>
    <script src="./script.js"></script>
</body>
</html>
