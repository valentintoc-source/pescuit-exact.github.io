<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pescuit Exact PRO</title>
    <link rel="stylesheet" href="https://unpkg.com" />
    <style>
        :root { --acc: #00ff88; --bg: #0b0e14; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 15px; text-align: center; }
        .nav { display: flex; gap: 10px; margin-bottom: 20px; }
        button { flex: 1; padding: 12px; border: 2px solid var(--acc); background: none; color: #fff; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .card { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 12px; border-top: 4px solid var(--acc); text-align: left; margin-bottom: 20px; }
        #map { height: 250px; border-radius: 10px; margin-top: 10px; border: 1px solid var(--acc); }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid var(--acc); background: #222; color: #fff; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        td, th { padding: 10px; border-bottom: 1px solid #333; text-align: left; font-size: 0.9rem; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <h2>PESCUIT EXACT PRO</h2>
    <div class="nav">
        <button onclick="show('river')">🌊 DUNĂRE</button>
        <button onclick="show('lake')">🎣 BĂLȚI</button>
    </div>

    <section id="lake-section" class="hidden">
        <input type="text" id="search" placeholder="Caută județ (ex: Ilfov, Giurgiu)..." oninput="filter()">
        <div id="details" class="card hidden">
            <h3 id="det-name" style="margin:0; color:var(--acc);"></h3>
            <p id="det-info"></p>
            <div id="map"></div>
        </div>
        <table>
            <thead><tr><th>Nume</th><th>Județ</th><th>Taxă</th></tr></thead>
            <tbody id="table-body"></tbody>
        </table>
    </section>

    <section id="river-section" class="hidden">
        <div class="card">
            <h3>Cote Dunăre Live</h3>
            <p>Giurgiu: +2cm (Stabil)</p>
            <p>Baziaș: +12cm (Creștere)</p>
        </div>
    </section>

    <script src="https://unpkg.com"></script>
    <script>
        const balti = [
            { n: "Hermes Periș", j: "Ilfov", t: "150 RON", r: "C&R Sportiv.", lat: 44.68, lng: 26.01 },
            { n: "Bila 2", j: "Giurgiu", t: "100 RON", r: "Caras permis.", lat: 44.31, lng: 25.75 },
            { n: "Chiroiu 4", j: "Ialomița", t: "100 RON", r: "Crap >4kg eliberat.", lat: 44.48, lng: 26.43 },
            { n: "Budeasa", j: "Argeș", t: "80 RON", r: "Pescuit baraj.", lat: 44.91, lng: 24.81 }
        ];

        let map, marker;
        function show(id) {
            document.getElementById('lake-section').className = id === 'lake' ? '' : 'hidden';
            document.getElementById('river-section').className = id === 'river' ? '' : 'hidden';
            if(id === 'lake') {
                render(balti);
                if(!map) {
                    map = L.map('map').setView([45.9, 24.9], 6);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                }
            }
        }

        function render(data) {
            const body = document.getElementById('table-body');
            body.innerHTML = data.map(b => `
                <tr onclick="det('${b.n}')" style="cursor:pointer">
                    <td>${b.n}</td><td>${b.j}</td><td>${b.t}</td>
                </tr>`).join('');
        }

        function filter() {
            const val = document.getElementById('search').value.toLowerCase();
            render(balti.filter(b => b.j.toLowerCase().includes(val) || b.n.toLowerCase().includes(val)));
        }

        function det(name) {
            const b = balti.find(x => x.n === name);
            document.getElementById('details').className = 'card';
            document.getElementById('det-name').innerText = b.n;
            document.getElementById('det-info').innerHTML = `<b>Județ:</b> ${b.j} | <b>Taxă:</b> ${b.t}<br><b>Reguli:</b> ${b.r}`;
            map.setView([b.lat, b.lng], 12);
            if(marker) map.removeLayer(marker);
            marker = L.marker([b.lat, b.lng]).addTo(map);
            setTimeout(() => map.invalidateSize(), 200);
        }
    </script>
</body>
</html>
