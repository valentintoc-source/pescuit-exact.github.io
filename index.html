<!DOCTYPE html>
<html lang="ro" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pescuit Exact | Fishing Forecast</title>
    <!-- Corecție: punct în față pentru GitHub -->
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <header>
        <div class="top-bar">
            <select id="lang-select">
                <option value="ro">🇷🇴 Română</option>
                <option value="en">🇬🇧 English</option>
            </select>
            <select id="theme-select">
                <option value="dark">🌑 Midnight</option>
                <option value="solar">☀️ Solar</option>
                <option value="camo">🌿 Camo</option>
            </select>
        </div>
    </header>

    <main id="app-content">
        <h1 id="title">Pescuit Exact</h1>
        
        <div class="score-container">
            <div class="score-circle">
                <span id="score-value">--%</span>
            </div>
            <p id="score-text">Selectează un loc de pescuit</p>
        </div>

        <div class="selection-cards">
            <button class="card" onclick="selectType('river')">
                <span class="icon">🌊</span>
                <span id="btn-dunare">DUNĂRE</span>
            </button>
            <button class="card" onclick="selectType('lake')">
                <span class="icon">🎣</span>
                <span id="btn-balti">BĂLȚI / LACURI</span>
            </button>
        </div>

        <!-- Caseta cu date hidrologice -->
        <div id="hydro-data" style="display: none; margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.1); border-radius: 10px;">
            <h3>Cota Giurgiu: <span id="river-level">+2cm</span></h3>
            <p id="river-status">Se încarcă datele...</p>
        </div>
    </main>

    <!-- Corecție: punct în față pentru GitHub -->
    <script src="./script.js"></script>
</body>
</html>
