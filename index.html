<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pescuit Exact PRO | România</title>
    <link rel="stylesheet" href="https://unpkg.com" />
    <style>
        :root { --acc: #00ff88; --bg: #0b0e14; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 15px; text-align: center; }
        .nav { display: flex; gap: 10px; margin-bottom: 20px; }
        button { flex: 1; padding: 12px; border: 2px solid var(--acc); background: none; color: #fff; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .card { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 12px; border-top: 4px solid var(--acc); text-align: left; margin-bottom: 20px; }
        #map { height: 250px; border-radius: 10px; margin-top: 10px; border: 1px solid var(--acc); }
        input { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 8px; border: 2px solid var(--acc); background: #222; color: #fff; box-sizing: border-box; font-size: 1rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: rgba(0,0,0,0.2); }
        td, th { padding: 12px; border-bottom: 1px solid #333; text-align: left; font-size: 0.9rem; }
        th { color: var(--acc); }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <h2 style="color:var(--acc)">PESCUIT EXACT PRO</h2>
    <div class="nav">
        <button onclick="show('river')">🌊 DUNĂRE</button>
        <button onclick="show('lake')">🎣 BĂLȚI</button>
    </div>

    <section id="lake-section" class="hidden">
        <input type="text" id="search" placeholder="Caută JUDEȚ (ex: Ilfov, Giurgiu, Dolj)..." oninput="filter()">
        <div id="details" class="card hidden">
            <h3 id="det-name" style="margin:0; color:var(--acc);"></h3>
            <p id="det-info"></p>
            <div id="map"></div>
        </div>
        <table>
            <thead><tr><th>Locație</th><th>Județ</th><th>Taxă</th></tr></thead>
            <tbody id="table-body"></tbody>
        </table>
    </section>

    <section id="river-section" class="hidden">
        <div class="card">
            <h3>Cote Dunăre Live (8 Apr 2026)</h3>
            <p><b>Giurgiu:</b> +2cm (Stabil)</p>
            <p><b>Baziaș:</b> +12cm (Creștere)</p>
            <p><b>Tulcea:</b> -4cm (Scădere)</p>
            <p style="color:var(--acc)">Atenție: Prohibiția începe mâine, 9 Aprilie!</p>
        </div>
    </section>

    <script src="https://unpkg.com"></script>
    <script>
        const balti = [
            { n: "Bila 2", j: "Giurgiu", t: "100 RON", r: "C&R la crap >4kg. Max 4 lansete.", lat: 44.31, lng: 25.75 },
            { n: "Hermes Periș", j: "Ilfov", t: "150 RON", r: "C&R Sportiv exclusiv. Doar fir de păr.", lat: 44.68, lng: 26.01 },
            { n: "Chiroiu 4", j: "Ialomița", t: "100 RON", r: "Crap >4kg eliberat. Fără momeală vie.", lat: 44.48, lng: 26.43 },
            { n: "Budeasa", j: "Argeș", t: "80 RON", r: "Pescuit pe baraj. Crap și Șalău.", lat: 44.91, lng: 24.81 },
            { n: "Zăvideni", j: "Olt", t: "Permis ANPA", r: "Somn și crap mare pe baraj.", lat: 44.65, lng: 24.26 },
            { n: "Suhaia", j: "Teleorman", t: "80 RON", r: "Crap sălbatic. Lac foarte mare.", lat: 43.74, lng: 25.21 },
            { n: "Fântânele", j: "Dolj", t: "100 RON", r: "Crap și Ten. Maluri curate.", lat: 44.11, lng: 23.65 },
            { n: "Dorobanțu", j: "Călărași", t: "100 RON", r: "Crap și Somn. Reținere 5kg.", lat: 44.22, lng: 26.95 },
            { n: "Enisala", j: "Tulcea", t: "80 RON", r: "Lângă cetate. Caras mare.", lat: 44.88, lng: 28.83 }
        ];

        let map, marker;
        function show(id) {
            document.getElementById('lake-section').classList.toggle('hidden', id !== 'lake');
            document.getElementById('river-section').classList.toggle('hidden', id !== 'river');
            if(id === 'lake') {
                render(balti);
                if(!map) {
                    map = L.map('map').setView([44.5, 26.0], 7);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                }
                setTimeout(() => map.invalidateSize(), 300);
            }
        }

        function render(data) {
            const body = document.getElementById('table-body');
            body.innerHTML = data.map(b => `
                <tr onclick="det('${b.n}')" style="cursor:pointer">
                    <td><b>${b.n}</b></td><td>${b.j}</td><td>${b.t}</td>
                </tr>`).join('');
        }

        function filter() {
            const val = document.getElementById('search').value.toLowerCase();
            render(balti.filter(b => b.j.toLowerCase().includes(val) || b.n.toLowerCase().includes(val)));
        }

        function det(name) {
            const b = balti.find(x => x.n === name);
            document.getElementById('details').classList.remove('hidden');
            document.getElementById('det-name').innerText = b.n;
            document.getElementById('det-info').innerHTML = `<b>Județ:</b> ${b.j} | <b>Taxă:</b> ${b.t}<br><br><b>REGULAMENT:</b> ${b.r}`;
            map.setView([b.lat, b.lng], 13);
            if(marker) map.removeLayer(marker);
            marker = L.marker([b.lat, b.lng]).addTo(map).bindPopup(b.n).openPopup();
            document.getElementById('details').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
